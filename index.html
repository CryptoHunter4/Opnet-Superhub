<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPNET X ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1a1a2e);
background-size:400% 400%;
animation:gradient 15s ease infinite;
color:white;
display:flex;
min-height:100vh;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.sidebar{
width:250px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
padding:25px;
position:fixed;
height:100%;
border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:22px;
margin-bottom:30px;
color:#00ffe0;
}

.sidebar a{
display:block;
margin:18px 0;
color:#ccc;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
color:#00ffe0;
transform:translateX(5px);
}

.wallet{
background:linear-gradient(90deg,#00ffe0,#00bfff);
color:black;
padding:10px;
border:none;
border-radius:10px;
margin-top:25px;
cursor:pointer;
font-weight:bold;
}

.main{
margin-left:250px;
padding:40px;
width:100%;
}

h1{
margin-bottom:30px;
font-size:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 0 25px rgba(0,255,255,0.15);
transition:0.4s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 40px rgba(0,255,255,0.4);
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00ffe0,#00bfff);
font-weight:bold;
cursor:pointer;
}

footer{
margin-top:50px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🚀 OPNET X ULTRA</div>
<a href="#">Dashboard</a>
<a href="#">Portfolio</a>
<a href="#">Swap</a>
<a href="#">Stake</a>
<a href="#">Launchpad</a>
<a href="#">Escrow</a>
<button class="wallet" onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="main">
<h1>Bitcoin Layer 1 Super DeFi App</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1621761191319-c6fb62004040" />
<h3>Live BTC Market</h3>
<p id="btc">Loading BTC...</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1640161704729-cbe966a08476" />
<h3>Portfolio Calculator</h3>
<input type="number" id="amount" placeholder="BTC Amount">
<button onclick="calc()">Calculate</button>
<p id="value"></p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1639762681057-408e52192e55" />
<h3>Staking 20% APY</h3>
<input type="number" id="stake">
<button onclick="stake()">Estimate Reward</button>
<p id="reward"></p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1642104704074-907c0698d49b" />
<h3>Swap BTC → OP20</h3>
<button>Swap (Demo)</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1642790551116-18e150f3bde1" />
<h3>Risk Analyzer</h3>
<button onclick="risk()">Analyze</button>
<p id="riskResult"></p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621504450181-5b5c6c1f3f10" />
<h3>Escrow Smart Contract</h3>
<button onclick="escrow()">Initialize</button>
<p id="escrowStatus"></p>
</div>

</div>

<footer>
Built for OP_NET Vibecode Challenge | 2026
</footer>

</div>

<script>
async function prices(){
let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
let data=await res.json();
document.getElementById("btc").innerHTML="BTC Price: $"+data.bitcoin.usd;
}
prices();

function calc(){
let amt=document.getElementById("amount").value;
let btcText=document.getElementById("btc").innerText.replace("BTC Price: $","");
let price=parseFloat(btcText);
document.getElementById("value").innerHTML="Portfolio Value: $"+(amt*price).toFixed(2);
}

function stake(){
let s=document.getElementById("stake").value;
document.getElementById("reward").innerHTML="Estimated Reward: "+(s*0.20)+" BTC";
}

function risk(){
let r=["Low 🟢","Medium 🟡","High 🔴"];
document.getElementById("riskResult").innerHTML=r[Math.floor(Math.random()*3)];
}

function escrow(){
document.getElementById("escrowStatus").innerHTML="Escrow Ready (Demo)";
}

function connectWallet(){
alert("OP Wallet Connected (Demo Mode)");
}
</script>

</body>
</html>
