<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPNET X - Ultimate Bitcoin L1 Super App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
transition:0.3s;
}
header{
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#00f5a0,#00d9f5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}
.toggle{
background:#00d9f5;
}
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}
.card{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.4);
transition:0.3s;
}
.card:hover{
transform:translateY(-6px);
}
h3{margin-bottom:12px}
input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:10px;
}
.chart{
height:300px;
}
footer{
text-align:center;
padding:20px;
opacity:0.6;
}
.light{
background:white;
color:black;
}
.light .card{
background:#f3f3f3;
}
</style>
</head>

<body>

<header>
<div class="logo">🚀 OPNET X</div>
<button class="toggle" onclick="toggleMode()">Toggle Mode</button>
</header>

<div class="container">

<div class="card">
<h3>💰 Live BTC Price</h3>
<p id="btcPrice">Loading...</p>
</div>

<div class="card">
<h3>📊 Portfolio Calculator</h3>
<input type="number" id="btcAmount" placeholder="Enter BTC amount">
<button onclick="calcPortfolio()">Calculate</button>
<p id="portfolioValue"></p>
</div>

<div class="card">
<h3>🔄 Swap Simulator</h3>
<input type="number" placeholder="BTC Amount">
<button>Swap to OP-20 (Demo)</button>
</div>

<div class="card">
<h3>💎 Staking Tool</h3>
<input type="number" id="stake" placeholder="Stake BTC">
<button onclick="stakeCalc()">Estimate Reward</button>
<p id="stakeResult"></p>
</div>

<div class="card">
<h3>🐋 Whale Tracker</h3>
<p>Latest Whale: 1,240 BTC (Demo)</p>
</div>

<div class="card">
<h3>📈 Trading Chart</h3>
<iframe class="chart" src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview&symbol=BTCUSD&interval=D&hidesidetoolbar=1&theme=dark" frameborder="0"></iframe>
</div>

<div class="card">
<h3>🚀 Launchpad</h3>
<p>$PILL Token Presale</p>
<button>View Details</button>
</div>

<div class="card">
<h3>🔐 Escrow</h3>
<button onclick="escrow()">Initialize Escrow</button>
<p id="escrowStatus"></p>
</div>

</div>

<footer>
Built for OP_NET Bitcoin Layer 1 | Vibecode Challenge 2026
</footer>

<script>

async function fetchBTC(){
let res=await fetch("https://api.coindesk.com/v1/bpi/currentprice/BTC.json");
let data=await res.json();
document.getElementById("btcPrice").innerHTML="$"+data.bpi.USD.rate+" USD";
}
fetchBTC();

function calcPortfolio(){
let amount=document.getElementById("btcAmount").value;
let priceText=document.getElementById("btcPrice").innerText.replace("$","").replace(" USD","").replace(",","");
let price=parseFloat(priceText);
let value=amount*price;
document.getElementById("portfolioValue").innerHTML="Value: $"+value.toFixed(2);
}

function stakeCalc(){
let amount=document.getElementById("stake").value;
let reward=amount*0.20;
document.getElementById("stakeResult").innerHTML="Estimated Reward: "+reward+" BTC";
}

function escrow(){
document.getElementById("escrowStatus").innerHTML="Escrow Smart Contract Ready (Demo)";
}

function toggleMode(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
