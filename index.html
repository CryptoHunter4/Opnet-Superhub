<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OP DeFi Signal Pro+</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:radial-gradient(circle at top,#0f2027,#1a1a2e,#000);
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
position:sticky;
top:0;
}

.logo{
font-family:'Orbitron',sans-serif;
color:#00ffe0;
font-size:22px;
}

nav button{
padding:8px 18px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#00ffe0,#00bfff);
cursor:pointer;
font-weight:bold;
}

.hero{
text-align:center;
padding:100px 20px 60px;
}

.hero h1{
font-size:45px;
margin-bottom:15px;
background:linear-gradient(90deg,#00ffe0,#00bfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:0.8;
margin-bottom:20px;
}

.container{
padding:40px 60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.07);
padding:25px;
border-radius:20px;
backdrop-filter:blur(25px);
box-shadow:0 0 40px rgba(0,255,255,0.2);
border:1px solid rgba(255,255,255,0.1);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 50px rgba(0,255,255,0.4);
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#00ffe0,#00bfff);
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,255,0.5);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(0,255,255,0.9);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

iframe{
width:100%;
height:400px;
border-radius:15px;
margin-top:20px;
}

footer{
text-align:center;
padding:30px;
opacity:0.6;
}
</style>
</head>

<body>

<nav>
<div class="logo">🚀 OP DeFi Signal</div>
<button onclick="connect()">Connect Wallet</button>
</nav>

<div class="hero">
<h1>Bitcoin Layer 1 DeFi Intelligence</h1>
<p>Liquidity • Yield Optimization • Risk Scanner • Smart Strategy</p>
</div>

<div class="container">
<div class="grid">

<div class="card">
<h3>Live Market</h3>
<p id="btc">BTC Loading...</p>
<p id="eth">ETH Loading...</p>
<p id="sol">SOL Loading...</p>
</div>

<div class="card">
<h3>Yield Optimizer</h3>
<input type="number" id="amount" placeholder="Enter BTC Amount">
<button onclick="yieldCalc()">Calculate Yield</button>
<p id="yieldResult"></p>
</div>

<div class="card">
<h3>Risk Scanner</h3>
<button onclick="risk()">Analyze Risk</button>
<p id="riskResult"></p>
</div>

<div class="card">
<h3>AI Strategy</h3>
<select id="strategy">
<option value="conservative">Conservative</option>
<option value="balanced">Balanced</option>
<option value="aggressive">Aggressive</option>
</select>
<button onclick="aiSuggest()">Generate</button>
<p id="aiResult"></p>
</div>

</div>

<h2 style="margin-top:60px;">Live BTC Chart</h2>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BTCUSD&interval=D&theme=dark"></iframe>

</div>

<footer>
Built for Vibecode Week 2 | OP_NET
</footer>

<script>
async function prices(){
let res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
let data=await res.json();
document.getElementById("btc").innerHTML="BTC: $"+data.bitcoin.usd;
document.getElementById("eth").innerHTML="ETH: $"+data.ethereum.usd;
document.getElementById("sol").innerHTML="SOL: $"+data.solana.usd;
}
prices();

function yieldCalc(){
let amt=document.getElementById("amount").value;
let apy=0.18;
let result=amt*apy;
document.getElementById("yieldResult").innerHTML="Estimated Yearly Reward: "+result+" BTC (18% APY)";
}

function risk(){
let r=["Low Risk 🟢","Medium Risk 🟡","High Risk 🔴"];
document.getElementById("riskResult").innerHTML=r[Math.floor(Math.random()*3)];
}

function aiSuggest(){
let type=document.getElementById("strategy").value;
let suggestion="";
if(type==="conservative"){
suggestion="Stake BTC in stable pool (8-12% APY)";
}
else if(type==="balanced"){
suggestion="Provide BTC-OP20 liquidity (15-18% APY)";
}
else{
suggestion="Farm emerging OP-20 tokens (20%+ APY)";
}
document.getElementById("aiResult").innerHTML=suggestion;
}

function connect(){
document.body.insertAdjacentHTML('beforeend',`
<div id="walletModal" style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;">
<div style="
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:300px;">
<h3>Select Wallet</h3>
<button onclick="closeModal()">OP Wallet</button>
<button onclick="closeModal()">MetaMask</button>
<br><br>
<button onclick="closeModal()">Cancel</button>
</div>
</div>
`);
}

function closeModal(){
document.getElementById("walletModal").remove();
}

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(0,255,255,0.5)";
ctx.beginPath();
for(let i=0;i<particles.length;i++){
let p=particles[i];
ctx.moveTo(p.x,p.y);
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
}
ctx.fill();
update();
}

function update(){
for(let i=0;i<particles.length;i++){
let p=particles[i];
p.y+=p.d;
if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}
}
}

setInterval(draw,33);
</script>
</body>
</html>
